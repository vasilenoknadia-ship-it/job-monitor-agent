# Source Monitoring Specification
# Источник бизнес-правил: раздел 24 сводного ТЗ.
# Контракт полей — раздел 2 ТЗ.

# ATS-платформы: у части из них есть публичный JSON API, что делает их
# самым дешёвым и надёжным источником (раздел 24, п.8 — "многие вакансии
# появляются здесь до попадания в job board"). has_public_api=true —
# значит для неё стоит писать connector в первую очередь (Фаза 1-4 плана).
ats_platforms:
  - name: "Greenhouse"
    domain_pattern: "boards.greenhouse.io"
    has_public_api: true
    api_notes: >
      Публичный JSON API: https://boards-api.greenhouse.io/v1/boards/{board_token}/jobs
      Токен борда = обычно slug компании в URL карьерной страницы.
  - name: "Lever"
    domain_pattern: "jobs.lever.co"
    has_public_api: true
    api_notes: >
      Публичный JSON API: https://api.lever.co/v0/postings/{company_slug}?mode=json
  - name: "Ashby"
    domain_pattern: "jobs.ashbyhq.com"
    has_public_api: true
    api_notes: "Публичный API через GraphQL-эндпоинт jobPostings; требует board name из URL."
  - name: "Workable"
    domain_pattern: "jobs.workable.com"
    has_public_api: true
    api_notes: "Публичный JSON API через apply.workable.com/api/v1/widget/accounts/{account}"
  - name: "SmartRecruiters"
    domain_pattern: "careers.smartrecruiters.com"
    has_public_api: true
    api_notes: "Публичный API: https://api.smartrecruiters.com/v1/companies/{company}/postings"
  - name: "Teamtailor"
    domain_pattern: "teamtailor.com"
    has_public_api: true
    api_notes: "У части компаний включён публичный careers API/JSON feed."
  - name: "Personio"
    domain_pattern: "jobs.personio.com"
    has_public_api: false
    api_notes: "Требует парсинг HTML career page."
  - name: "Recruitee"
    domain_pattern: "recruitee.com"
    has_public_api: true
    api_notes: "Публичный JSON API: https://{company}.recruitee.com/api/offers/"
  - name: "Comeet"
    domain_pattern: "comeet.com"
    has_public_api: false
  - name: "Jobvite"
    domain_pattern: "jobs.jobvite.com"
    has_public_api: false
  - name: "iCIMS"
    domain_pattern: "icims.com"
    has_public_api: false
  - name: "SuccessFactors"
    domain_pattern: "successfactors.com"
    has_public_api: false
  - name: "Workday"
    domain_pattern: "myworkdayjobs.com"
    has_public_api: false
    api_notes: >
      Формально не публичный API, но фронтенд дёргает JSON-эндпоинт
      /wday/cxs/{tenant}/{site}/jobs — можно использовать так же, как API,
      уважая rate limits и robots.txt.
  - name: "Pinpoint"
    domain_pattern: "pinpointhq.com"
    has_public_api: false
  - name: "BambooHR"
    domain_pattern: "bamboohr.com"
    has_public_api: false


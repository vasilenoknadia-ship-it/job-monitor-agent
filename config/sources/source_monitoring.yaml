# Раздел 24, п.3 и п.13 — приоритет источников и как это влияет на выбор
# canonical source / дедупликацию (используется canonical_resolver и
# deduplication engine)
source_priority_rules:
  hierarchy:
    - "company_career_page"
    - "employer_ats_page"
    - "specialist_industry_board"
    - "major_national_job_board"
    - "recruitment_agency"
    - "aggregator"
  source_quality_score:
    company_career_page_or_ats: 100
    specialist_board_direct_to_employer: 90
    major_national_board_full_description: 80
    reputable_recruitment_agency: 70
    aggregator_confirmed_original: 50
    aggregator_unconfirmed_original: 20

# Раздел 24, п.7 и раздел 7 общего ТЗ — правила поиска и фиксации canonical URL
canonical_source_rules:
  resolution_order:
    - "official employer website"
    - "official employer ATS"
    - "recruitment agency posting"
    - "job board"
    - "aggregator"
  aggregator_workflow:
    - "extract employer, exact title, location and visible date"
    - "search employer career page and ATS for the same role"
    - "save employer/ATS URL as canonical_url"
    - "keep aggregator URL only as discovered_via"
    - "reject record if original role is closed, expired or unconfirmable after reasonable check"
  if_not_found:
    canonical_url: null
    add_concern: "original source not confirmed"
    score_may_be_reduced: true

# Раздел 24, п.10
freshness_rules:
  prefer_posted_within_days: 30
  keep_older_if_still_accepting_applications: true
  reject_if_marked:
    - closed
    - filled
    - expired
    - archived
    - "no longer accepting applications"
  if_no_date_shown:
    date_posted: null
    use_field: "first_seen_at"
  recheck_unresolved_on_next_run: true

# Раздел 24, п.9 — географическая совместимость на уровне источников
# (детальные правила по трекам — в geography_rules каждого track_*.yaml)
geography_compatibility_signals:
  auto_compatible:
    - "Vilnius"
    - "Lithuania"
    - "Baltics"
    - "Remote Europe"
    - "Remote EU"
    - "Remote EEA"
    - "Europe - Remote"
    - "EU-based"
    - "Remote from Lithuania"
    - "EMEA remote"
    - "CET / EET timezone"
    - "Contractor within the EU"
  manual_review:
    - "UK remote"
    - "Ireland remote"
    - "Germany remote"
    - "France remote"
    - "Hybrid London / Berlin / Prague / Stockholm / Copenhagen"
    - "Relocation support"
    - "Work from abroad"
    - "EMEA"
  explicit_reject_only_if:
    - "Must reside in the UK"
    - "UK residents only"
    - "UK right to work required"
    - "Ireland-based only"
    - "Remote only within Germany"
    - "No employment outside listed country"

# Раздел 24, п.15 — сознательно НЕ подключаем в первой версии
fallback_rules:
  excluded_sources_v1:
    - name: "Dice"
      reason: "mainly US technology jobs"
    - name: "Toptal"
      reason: "freelance technology network"
    - name: "Technojobs"
      reason: "excessively technology-heavy"
    - name: "The Metaverse Jobs"
      reason: "too narrow and weakly relevant"
    - name: "Getwork"
      reason: "strong US bias"
    - name: "ZipRecruiter"
      reason: "mainly US"
    - name: "Ladders"
      reason: "US senior-job bias"
    - name: "CareerBuilder"
      reason: "US bias and duplicate risk"
    - name: "Idealist"
      reason: "nonprofit focus"
    - name: "XING Jobs"
      reason: "low priority for English-language remote search"
    - name: "Monster"
      reason: "add later only if core sources underperform"
  add_later_if_core_underperforms:
    - "Monster"

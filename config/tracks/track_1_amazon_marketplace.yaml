# Раздел 25, п.7 — предложенная шкала (совпадает с общей шкалой раздела 12)
scoring_rules:
  scale:
    excellent: "90-100: direct Amazon/marketplace ownership; senior/lead/head level; geography fully matches; strong overlap with operations, growth and P&L"
    strong: "75-89: strong marketplace role but broader e-commerce scope, agency environment or slightly imperfect geography"
    manual_review: "60-74: adjacent digital-commerce role with meaningful Amazon responsibility"
    reject: "below 60: usually exclude unless company is Priority A and description shows unusually strong Amazon ownership"
  priority_a_override: true  # Priority A компании получают снисхождение при пограничном score

output_explanation_fields:
  - "matched_title"
  - "context_signals_found"
  - "seniority_estimate"
  - "geography_status"
  - "company_priority"

# Track 1 — Amazon / Marketplace Operations
# Источник бизнес-правил: раздел 25 сводного ТЗ.
# Контракт полей — раздел 2 ТЗ. Общий движок (src/classifier) не должен
# содержать ни одного значения из этого файла захардкоженным в коде.

track_id: track_1
track_name: "Amazon / Marketplace Operations"

target_titles:
  - "Amazon Marketplace Manager"
  - "Senior Amazon Marketplace Manager"
  - "Amazon Manager"
  - "Senior Amazon Manager"
  - "Amazon Brand Manager"
  - "Senior Amazon Brand Manager"
  - "Amazon Growth Manager"
  - "Amazon Account Manager"
  - "Senior Amazon Account Manager"
  - "Amazon Operations Manager"
  - "Amazon Channel Manager"
  - "Amazon E-commerce Manager"
  - "Marketplace Manager"
  - "Senior Marketplace Manager"
  - "Marketplaces Manager"
  - "Marketplace Account Manager"
  - "Marketplace Operations Manager"
  - "Marketplace Growth Manager"
  - "Marketplace Lead"
  - "Amazon Team Lead"
  - "Marketplace Team Lead"
  - "Head of Amazon"
  - "Head of Amazon and Marketplaces"
  - "Head of Marketplace"
  - "Head of Marketplaces"
  - "Head of E-commerce"
  - "Head of Commerce"
  - "Amazon Account Head"
  - "E-commerce Operations Lead"
  - "Digital Commerce Manager"

# Тайтлы, релевантные только при наличии marketplace-контекста в описании
# (раздел 25, п.3: "Senior Specialist" / "Department Manager" сами по себе
# слишком общие)
conditional_titles:
  - "Senior Specialist"
  - "Department Manager"
  - "Head of Department"

# Раздел 25, п.5 — хотя бы один сигнал должен присутствовать в описании,
# если тайтл сам по себе неоднозначен (например "Amazon Operations Manager"
# может означать склад или AWS)
required_context_signals:
  - "Seller Central"
  - "Vendor Central"
  - "marketplace"
  - "FBA"
  - "catalogue"
  - "catalog"
  - "listing"
  - "Amazon Ads"
  - "PPC"
  - "ACOS"
  - "TACOS"
  - "Buy Box"
  - "account health"
  - "marketplace P&L"

positive_signals:
  - "P&L ownership"
  - "Seller Central"
  - "Vendor Central"
  - "catalogue management"
  - "listings optimization"
  - "PPC / advertising ownership"
  - "account health management"
  - "process design"
  - "team management"

negative_signals:
  - "entry-level responsibilities framed as senior title"
  - "warehouse / fulfilment floor operations"
  - "AWS / cloud infrastructure focus"
  - "pure customer support scope"

# Раздел 25, п.4 — исключаем, если термин описывает саму роль, а не
# встречается фоново в тексте о компании
explicit_exclusions:
  - "intern"
  - "internship"
  - "junior"
  - "assistant"
  - "virtual assistant"
  - "customer support"
  - "warehouse"
  - "fulfilment associate"
  - "delivery"
  - "AWS"
  - "software engineer"
  - "cloud"
  - "solution architect"
  - "VP"
  - "chief"
  - "CMO"
  - "managing director"

seniority_rules:
  target_levels:
    - "senior_individual_contributor"
    - "team_lead"
    - "manager"
    - "head_of_function"
    - "head_of_department"
  excluded_levels:
    - "entry_level"
    - "internship"
    - "c_level"
    - "vp"
  notes: >
    "Manager" может быть senior individual-contributor тайтлом.
    Не требовать наличия прямых подчинённых, если это явно не
    указано в вакансии (раздел 25, важное примечание).

geography_rules:
  onsite_hybrid_accepted:
    - "Vilnius"
  remote_accepted_regions:
    - "Europe"
    - "United Kingdom"
    - "Ireland"
  # UK/Ireland remote не отклоняются автоматически — раздел 10 и 19
  manual_review_regions:
    - "United Kingdom"
    - "Ireland"

